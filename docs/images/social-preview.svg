<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 640" font-family="ui-sans-serif, -apple-system, 'Segoe UI', Inter, sans-serif">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0b0f1a"/>
      <stop offset="100%" stop-color="#13182a"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#79c0ff"/>
      <stop offset="100%" stop-color="#7ee787"/>
    </linearGradient>
    <linearGradient id="strikeRed" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#f85149"/>
      <stop offset="100%" stop-color="#ff7b72"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1280" height="640" fill="url(#bg)"/>

  <!-- Subtle grid pattern -->
  <g opacity="0.04" stroke="#79c0ff" stroke-width="1">
    <line x1="0" y1="80" x2="1280" y2="80"/>
    <line x1="0" y1="160" x2="1280" y2="160"/>
    <line x1="0" y1="240" x2="1280" y2="240"/>
    <line x1="0" y1="320" x2="1280" y2="320"/>
    <line x1="0" y1="400" x2="1280" y2="400"/>
    <line x1="0" y1="480" x2="1280" y2="480"/>
    <line x1="0" y1="560" x2="1280" y2="560"/>
    <line x1="160" y1="0" x2="160" y2="640"/>
    <line x1="320" y1="0" x2="320" y2="640"/>
    <line x1="480" y1="0" x2="480" y2="640"/>
    <line x1="640" y1="0" x2="640" y2="640"/>
    <line x1="800" y1="0" x2="800" y2="640"/>
    <line x1="960" y1="0" x2="960" y2="640"/>
    <line x1="1120" y1="0" x2="1120" y2="640"/>
  </g>

  <!-- Brand row -->
  <g transform="translate(80, 100)">
    <rect x="0" y="0" width="60" height="60" rx="12" fill="#161a22" stroke="#79c0ff" stroke-width="2"/>
    <text x="30" y="42" text-anchor="middle" font-size="34" fill="#79c0ff" font-weight="700">M</text>
    <text x="80" y="44" font-size="34" fill="#e6edf3" font-weight="700">MemoryBridge</text>
  </g>

  <!-- Headline -->
  <g transform="translate(80, 220)">
    <text font-size="86" font-weight="800" fill="#e6edf3" letter-spacing="-1">
      <tspan x="0" y="0" fill="url(#strikeRed)" text-decoration="line-through">4,000</tspan>
      <tspan x="280" y="0" fill="#e6edf3"> tokens.</tspan>
    </text>
    <text font-size="86" font-weight="800" fill="url(#accent)" letter-spacing="-1" x="0" y="100">
      400 tokens instead.
    </text>
  </g>

  <!-- Subhead -->
  <text x="80" y="455" font-size="28" fill="#8b949e" font-weight="400">
    Cross-tool AI memory for Claude Code, Cursor, Antigravity,
  </text>
  <text x="80" y="490" font-size="28" fill="#8b949e" font-weight="400">
    Windsurf, Gemini CLI &amp; every MCP-compatible AI tool.
  </text>

  <!-- Bottom row: install command + repo -->
  <g transform="translate(80, 540)">
    <rect x="0" y="0" width="430" height="50" rx="8" fill="#161a22" stroke="#30363d" stroke-width="1"/>
    <text x="20" y="32" font-family="ui-monospace, Menlo, monospace" font-size="20" fill="#7ee787">$</text>
    <text x="42" y="32" font-family="ui-monospace, Menlo, monospace" font-size="20" fill="#e6edf3">npx memorybridge init</text>

    <text x="470" y="32" font-size="20" fill="#7d8590">github.com/IamRamgarhia/memorybridge</text>
  </g>

  <!-- Decorative element: braces -->
  <g transform="translate(1050, 280)" opacity="0.55">
    <text font-family="ui-monospace, Menlo, monospace" font-size="160" fill="url(#accent)" font-weight="200">{ }</text>
  </g>

  <!-- License badge in corner -->
  <g transform="translate(1130, 80)">
    <rect x="0" y="0" width="80" height="26" rx="4" fill="#161a22" stroke="#30363d"/>
    <text x="40" y="18" text-anchor="middle" font-size="13" fill="#7ee787" font-family="ui-monospace, monospace">MIT</text>
  </g>
</svg>
