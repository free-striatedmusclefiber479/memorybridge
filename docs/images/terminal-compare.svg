<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1100 720" font-family="ui-monospace, 'SF Mono', Menlo, Consolas, monospace" font-size="14">
  <defs>
    <linearGradient id="bgGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0f1117"/>
      <stop offset="100%" stop-color="#0a0c11"/>
    </linearGradient>
    <filter id="shadow" x="-5%" y="-5%" width="110%" height="115%">
      <feDropShadow dx="0" dy="6" stdDeviation="14" flood-color="#000" flood-opacity="0.45"/>
    </filter>
  </defs>

  <!-- Window -->
  <rect x="20" y="20" width="1060" height="680" rx="10" ry="10" fill="url(#bgGrad)" stroke="#2a2f3a" stroke-width="1" filter="url(#shadow)"/>

  <!-- Title bar -->
  <rect x="20" y="20" width="1060" height="32" rx="10" ry="10" fill="#161a22"/>
  <rect x="20" y="42" width="1060" height="12" fill="#161a22"/>
  <circle cx="42" cy="36" r="6" fill="#ff5f57"/>
  <circle cx="62" cy="36" r="6" fill="#febc2e"/>
  <circle cx="82" cy="36" r="6" fill="#28c840"/>
  <text x="550" y="40" text-anchor="middle" fill="#7d8590" font-size="12">memorybridge compare — bash</text>

  <!-- Prompt -->
  <text x="40" y="80" fill="#a3b8ff">$</text>
  <text x="58" y="80" fill="#d1d9e0">memorybridge compare --sessions 300</text>

  <!-- Header -->
  <text x="40" y="115" fill="#7ee787" font-weight="bold">===============================================================</text>
  <text x="40" y="135" fill="#79c0ff" font-weight="bold">        BEFORE vs AFTER  —  one session of AI work</text>
  <text x="40" y="155" fill="#7ee787" font-weight="bold">===============================================================</text>

  <!-- Description -->
  <text x="40" y="185" fill="#8b949e">  Scenario: you start a new chat with your AI on a Next.js project.</text>
  <text x="40" y="203" fill="#8b949e">  WITHOUT MemoryBridge, you have to re-paste project context.</text>
  <text x="40" y="221" fill="#8b949e">  WITH MemoryBridge, the AI loads it automatically (header only).</text>

  <!-- Comparison table -->
  <text x="40" y="255" fill="#d1d9e0">  ┌─────────────────────────────────┬─────────────┬─────────────┐</text>
  <text x="40" y="273" fill="#d1d9e0">  │                                 │   </text>
  <text x="412" y="273" fill="#f85149" font-weight="bold">WITHOUT</text>
  <text x="478" y="273" fill="#d1d9e0">   │    </text>
  <text x="540" y="273" fill="#7ee787" font-weight="bold">WITH</text>
  <text x="588" y="273" fill="#d1d9e0">     │</text>
  <text x="40" y="291" fill="#d1d9e0">  ├─────────────────────────────────┼─────────────┼─────────────┤</text>
  <text x="40" y="309" fill="#d1d9e0">  │ INPUT tokens (context to AI)    │  </text>
  <text x="408" y="309" fill="#f85149">3,000</text>
  <text x="450" y="309" fill="#d1d9e0">      │   </text>
  <text x="500" y="309" fill="#7ee787">~250</text>
  <text x="534" y="309" fill="#d1d9e0">      │</text>
  <text x="40" y="327" fill="#d1d9e0">  │ OUTPUT tokens (AI's reply)      │      </text>
  <text x="440" y="327" fill="#f85149">~800</text>
  <text x="476" y="327" fill="#d1d9e0">   │      </text>
  <text x="530" y="327" fill="#7ee787">~200</text>
  <text x="564" y="327" fill="#d1d9e0">   │</text>
  <text x="40" y="345" fill="#d1d9e0">  │ Style level                     │       n/a   │   </text>
  <text x="500" y="345" fill="#79c0ff">1/5 (ultra)</text>
  <text x="595" y="345" fill="#d1d9e0">  │</text>
  <text x="40" y="363" fill="#d1d9e0">  └─────────────────────────────────┴─────────────┴─────────────┘</text>

  <!-- Savings -->
  <text x="40" y="397" fill="#d1d9e0">  Input tokens saved per session:    </text>
  <text x="320" y="397" fill="#7ee787" font-weight="bold">2,750 (91%)</text>
  <text x="40" y="415" fill="#d1d9e0">  Output tokens saved per session:   </text>
  <text x="320" y="415" fill="#7ee787" font-weight="bold">~600 (75%)</text>
  <text x="40" y="433" fill="#d1d9e0">  Total tokens saved per session:    </text>
  <text x="320" y="433" fill="#fbbf24" font-weight="bold">3,350 (88%)</text>

  <!-- Cost section -->
  <text x="40" y="473" fill="#7ee787" font-weight="bold">===============================================================</text>
  <text x="40" y="491" fill="#79c0ff" font-weight="bold">                   COST IMPACT  (real numbers)</text>
  <text x="40" y="509" fill="#7ee787" font-weight="bold">===============================================================</text>
  <text x="40" y="535" fill="#8b949e">  Assuming 300 AI sessions per month:</text>

  <text x="40" y="565" fill="#d1d9e0">  ┌──────────┬───────────────┬───────────────┬───────────────┐</text>
  <text x="40" y="583" fill="#d1d9e0">  │  Model   │  Without/mo   │   With/mo     │   </text>
  <text x="500" y="583" fill="#7ee787" font-weight="bold">Saved/mo</text>
  <text x="586" y="583" fill="#d1d9e0">    │</text>
  <text x="40" y="601" fill="#d1d9e0">  ├──────────┼───────────────┼───────────────┼───────────────┤</text>
  <text x="40" y="619" fill="#d1d9e0">  │ haiku    │         $0.34 │         $0.05 │         </text>
  <text x="510" y="619" fill="#7ee787">$0.29</text>
  <text x="554" y="619" fill="#d1d9e0">   │</text>
  <text x="40" y="637" fill="#d1d9e0">  │ sonnet   │         $4.10 │         $0.59 │         </text>
  <text x="510" y="637" fill="#7ee787" font-weight="bold">$3.51</text>
  <text x="554" y="637" fill="#d1d9e0">   │</text>
  <text x="40" y="655" fill="#d1d9e0">  │ opus     │        $20.50 │         $2.95 │        </text>
  <text x="500" y="655" fill="#fbbf24" font-weight="bold">$17.55</text>
  <text x="554" y="655" fill="#d1d9e0">   │</text>
  <text x="40" y="673" fill="#d1d9e0">  └──────────┴───────────────┴───────────────┴───────────────┘</text>
</svg>
